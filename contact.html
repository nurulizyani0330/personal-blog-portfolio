<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio Blog Peribadi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Izyani<span>.Blog</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><button id="theme-toggle" class="theme-toggle-btn">🌙 Dark</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Hubungi Saya</h2>
            <p style="margin-bottom: 2rem;">Mempunyai soalan, idea projek, atau ingin berkolaborasi? Sila isi borang di bawah.</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Nama Penuh</label>
                    <input type="text" id="name" name="name" placeholder="Masukkan nama anda" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mel</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan e-mel anda" required>
                </div>
                <div class="form-group">
                    <label for="message">Mesej</label>
                    <textarea id="message" name="message" rows="6" placeholder="Tulis mesej anda di sini..." required></textarea>
                </div>
                <button type="submit" class="btn" style="border: none; cursor: pointer;">Hantar Mesej</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nurul Izyani. CSD 34203 | Universiti Sultan Zainal Abidin.</p>
    </footer>

    <!-- KOD JAVASCRIPT DARK MODE -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // Semak jika pengguna pernah memilih tema gelap sebelum ini (Local Storage)
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
            themeToggleBtn.textContent = '☀️ Light';
        }

        // Fungsi apabila butang diklik
        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            
            // Tukar teks butang dan simpan tetapan pengguna
            if (body.classList.contains('dark-theme')) {
                themeToggleBtn.textContent = '☀️ Light';
                localStorage.setItem('theme', 'dark');
            } else {
                themeToggleBtn.textContent = '🌙 Dark';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
