<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Personal Portfolio Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Izyani<span>.Blog</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><button id="theme-toggle" class="theme-toggle-btn">🌙 Dark</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contact Me</h2>
            <p style="margin-bottom: 2rem;">Have questions, project ideas, or want to collaborate? Please fill out the form below.</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn" style="border: none; cursor: pointer;">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nurul Izyani. CSD 34203 | Universiti Sultan Zainal Abidin.</p>
    </footer>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
            themeToggleBtn.textContent = '☀️ Light';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            if (body.classList.contains('dark-theme')) {
                themeToggleBtn.textContent = '☀️ Light';
                localStorage.setItem('theme', 'dark');
            } else {
                themeToggleBtn.textContent = '🌙 Dark';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
